<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Info Demo</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>

  <style>
    /* ── Design tokens ── */
    :root {
      --sky-deep:   #0f172a;
      --sky-mid:    #1e3a5f;
      --sky-light:  #2d6a9f;
      --accent:     #38bdf8;
      --accent-dim: #0ea5e9;
      --surface:    #ffffff0d;
      --card-bg:    #ffffff12;
      --text-main:  #f1f5f9;
      --text-muted: #94a3b8;
      --radius:     16px;
    }

    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--sky-deep) 0%, var(--sky-mid) 60%, var(--sky-light) 100%);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 64px;
    }

    /* Subtle star-field texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px, 100px 100px;
      background-position: 0 0, 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* ── Header ── */
    .site-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .site-header .eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .site-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.9rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.15;
      margin: 0;
      color: #fff;
    }

    .site-header h1 span {
      color: var(--accent);
    }

    .site-header p {
      margin: 10px 0 0;
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    /* ── Search panel ── */
    .search-panel {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 24px;
      backdrop-filter: blur(12px);
      margin-bottom: 24px;
    }

    .search-panel label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    #cityInput {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      padding: 10px 14px;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    #cityInput::placeholder { color: #64748b; }

    #cityInput:focus {
      border-color: var(--accent);
      background: rgba(56,189,248,0.07);
    }

    #getWeatherBtn {
      background: var(--accent);
      color: var(--sky-deep);
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #getWeatherBtn:hover  { background: #7dd3fc; }
    #getWeatherBtn:active { transform: scale(0.97); }
    #getWeatherBtn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Quick city chips ── */
    .city-chips {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      font-size: 0.78rem;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(56,189,248,0.3);
      color: var(--accent);
      background: rgba(56,189,248,0.07);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .chip:hover {
      background: rgba(56,189,248,0.18);
      border-color: var(--accent);
    }

    /* ── Loading ── */
    #loadingBox {
      display: none;
      text-align: center;
      padding: 28px;
    }

    .spinner-ring {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingBox p {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin: 0;
    }

    /* ── Weather card ── */
    #weatherCard {
      display: none;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 28px;
      backdrop-filter: blur(12px);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .city-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 2px;
    }

    .card-top .meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .weather-icon-badge {
      font-size: 2.6rem;
      line-height: 1;
    }

    /* Temp row */
    .temp-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 6px;
    }

    .temp-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.4rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .temp-unit {
      font-size: 1.3rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .weather-desc {
      font-size: 1rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 24px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-box .stat-icon {
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-box .stat-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .stat-box .stat-lbl {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }

    /* ── Error ── */
    #errorBox {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius);
      padding: 18px 20px;
      color: #fca5a5;
      font-size: 0.9rem;
    }

    #errorBox i { font-size: 1.1rem; margin-right: 6px; }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- Header -->
  <header class="site-header">
    <p class="eyebrow">jQuery AJAX Demo</p>
    <h1>Live <span>Weather</span> Lookup</h1>
    <p>Real data · No API key required · Powered by Open-Meteo</p>
  </header>

  <!-- Search Panel -->
  <div class="search-panel">
    <label for="cityInput">Enter City Name</label>
    <div class="input-row">
      <input
        type="text"
        id="cityInput"
        placeholder="e.g. Dodoma, London, Tokyo..."
        autocomplete="off"
      />
      <button id="getWeatherBtn">
        <i class="bi bi-search"></i> Get Info
      </button>
    </div>

    <div class="city-chips">
      <span class="chip">Dodoma</span>
      <span class="chip">Dar es Salaam</span>
      <span class="chip">Nairobi</span>
      <span class="chip">London</span>
      <span class="chip">Tokyo</span>
    </div>
  </div>

  <!-- Loading animation -->
  <div id="loadingBox">
    <div class="spinner-ring"></div>
    <p>Fetching weather data...</p>
  </div>

  <!-- Error box -->
  <div id="errorBox">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span id="errorMsg">Something went wrong.</span>
  </div>

  <!-- Weather Result Card -->
  <div id="weatherCard">
    <div class="card-top">
      <div>
        <h2 class="city-name" id="cityDisplay">—</h2>
        <p class="meta" id="coordsDisplay">—</p>
      </div>
      <div class="weather-icon-badge" id="weatherEmoji">🌤️</div>
    </div>

    <div class="temp-row">
      <span class="temp-value" id="tempDisplay">—</span>
      <span class="temp-unit">°C</span>
    </div>
    <p class="weather-desc" id="descDisplay">—</p>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-icon"><i class="bi bi-thermometer-half"></i></div>
        <div class="stat-val" id="feelsLike">—</div>
        <div class="stat-lbl">Feels Like</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon"><i class="bi bi-droplet-fill"></i></div>
        <div class="stat-val" id="humidity">—</div>
        <div class="stat-lbl">Humidity</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon"><i class="bi bi-wind"></i></div>
        <div class="stat-val" id="windSpeed">—</div>
        <div class="stat-lbl">Wind km/h</div>
      </div>
    </div>
  </div>

</div><!-- /.page-wrap -->

<!-- jQuery 3 -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
  /* ────────────────────────────────────────────
     WMO Weather Code → human description + emoji
  ──────────────────────────────────────────── */
  const WMO_CODES = {
    0:  { desc: "Clear Sky",            emoji: "☀️"  },
    1:  { desc: "Mainly Clear",         emoji: "🌤️" },
    2:  { desc: "Partly Cloudy",        emoji: "⛅"  },
    3:  { desc: "Overcast",             emoji: "☁️"  },
    45: { desc: "Foggy",                emoji: "🌫️" },
    48: { desc: "Icy Fog",              emoji: "🌫️" },
    51: { desc: "Light Drizzle",        emoji: "🌦️" },
    53: { desc: "Drizzle",              emoji: "🌦️" },
    55: { desc: "Heavy Drizzle",        emoji: "🌧️" },
    61: { desc: "Slight Rain",          emoji: "🌧️" },
    63: { desc: "Rain",                 emoji: "🌧️" },
    65: { desc: "Heavy Rain",           emoji: "🌧️" },
    71: { desc: "Light Snow",           emoji: "🌨️" },
    73: { desc: "Snow",                 emoji: "❄️"  },
    75: { desc: "Heavy Snow",           emoji: "❄️"  },
    80: { desc: "Rain Showers",         emoji: "🌦️" },
    95: { desc: "Thunderstorm",         emoji: "⛈️"  },
    99: { desc: "Thunderstorm + Hail",  emoji: "⛈️"  },
  };

  /* ── UI helpers ── */
  function showLoading() {
    $("#weatherCard, #errorBox").fadeOut(150);
    $("#loadingBox").fadeIn(200);
    $("#getWeatherBtn").prop("disabled", true);
  }

  function hideLoading() {
    $("#loadingBox").fadeOut(150);
    $("#getWeatherBtn").prop("disabled", false);
  }

  function showError(msg) {
    hideLoading();
    $("#errorMsg").text(msg);
    $("#errorBox").fadeIn(250);
  }

  function showCard() {
    hideLoading();
    $("#weatherCard").fadeIn(350);
  }

  /* ────────────────────────────────────────────
     STEP 1 — Geocoding: city name → lat/lon
     Uses Open-Meteo's free geocoding API.
     $.get() call #1
  ──────────────────────────────────────────── */
  function fetchWeather(city) {
    if (!city.trim()) {
      showError("Please enter a city name first.");
      return;
    }

    showLoading();

    const geoUrl = "https://geocoding-api.open-meteo.com/v1/search";

    $.get(geoUrl, { name: city, count: 1, language: "en", format: "json" })
      .done(function (geoData) {

        if (!geoData.results || geoData.results.length === 0) {
          showError("City not found. Try a different spelling.");
          return;
        }

        const place = geoData.results[0];
        const lat   = place.latitude;
        const lon   = place.longitude;
        const label = place.name + (place.country ? ", " + place.country : "");

        /* ──────────────────────────────────────────
           STEP 2 — Weather: lat/lon → current data
           $.ajax() call — demonstrating $.ajax() use
        ────────────────────────────────────────── */
        $.ajax({
          url: "https://api.open-meteo.com/v1/forecast",
          method: "GET",
          data: {
            latitude:              lat,
            longitude:             lon,
            current:               "temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code",
            temperature_unit:      "celsius",
            wind_speed_unit:       "kmh",
            forecast_days:         1
          },
          success: function (wData) {
            const c    = wData.current;
            const code = c.weather_code;
            const info = WMO_CODES[code] || { desc: "Unknown", emoji: "🌡️" };

            /* Populate card */
            $("#cityDisplay").text(label);
            $("#coordsDisplay").text(lat.toFixed(2) + "°, " + lon.toFixed(2) + "°");
            $("#tempDisplay").text(Math.round(c.temperature_2m));
            $("#descDisplay").text(info.desc);
            $("#weatherEmoji").text(info.emoji);
            $("#feelsLike").text(Math.round(c.apparent_temperature) + "°C");
            $("#humidity").text(c.relative_humidity_2m + "%");
            $("#windSpeed").text(Math.round(c.wind_speed_10m));

            showCard();
          },
          error: function () {
            showError("Weather fetch failed. Please try again.");
          }
        });

      })
      .fail(function () {
        showError("Geocoding failed. Check your internet connection.");
      });
  }

  /* ── Event bindings ── */
  $(document).ready(function () {

    // Button click
    $("#getWeatherBtn").on("click", function () {
      fetchWeather($("#cityInput").val());
    });

    // Enter key in input
    $("#cityInput").on("keydown", function (e) {
      if (e.key === "Enter") fetchWeather($(this).val());
    });

    // Quick-pick chips
    $(".chip").on("click", function () {
      const city = $(this).text();
      $("#cityInput").val(city);
      fetchWeather(city);
    });

    // Default load — show Dodoma on open
    fetchWeather("Dodoma");
  });
</script>

</body>
</html>
